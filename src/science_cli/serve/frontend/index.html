<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sci — Plot Gallery</title>
  <link rel="stylesheet" href="/assets/dashboard.css" />
</head>
<body>
  <div class="app-container">
    <header class="mobile-header">
      <div class="logo-text">sci <span class="logo-subtitle">gallery</span></div>
      <div class="menu-toggle">
        <svg fill="none" stroke="currentColor" stroke-dasharray="0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" height="24">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">&mu;</div>
        <div>
          <span class="logo-text">science-cli</span>
          <span class="logo-subtitle">plot gallery</span>
        </div>
      </div>

      <div class="sidebar-context">
        <div class="context-title">Current Session</div>
        <div class="context-item">
          <span class="context-label">Project: </span>
          <span class="context-value" id="ctx-project">Loading...</span>
        </div>
        <div class="context-item">
          <span class="context-label">Protocol: </span>
          <span class="context-value" id="ctx-protocol">-</span>
        </div>
        <div class="context-item">
          <span class="context-label">Step: </span>
          <span class="context-value" id="ctx-step">-</span>
        </div>
      </div>

      <nav class="nav-links">
        <a href="/" class="nav-link active">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          Plot Gallery
        </a>
      </nav>

      <div class="sidebar-filters">
        <div class="sidebar-form-group">
          <label class="sidebar-form-label">View</label>
          <select class="sidebar-select" id="view-mode" onchange="toggleView(this.value)">
            <option value="grid">Grid</option>
            <option value="list">List</option>
          </select>
        </div>
        <div class="connection-indicator">
          <div class="status-dot"></div>
          <span>cli online</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div class="breadcrumb" id="breadcrumb">
          <span class="breadcrumb-root" id="bc-project">project</span>
        </div>
        <div class="header-actions">
          <div class="theme-chooser">
            <button class="theme-btn" data-theme="dark">Dark</button>
            <button class="theme-btn" data-theme="light">Light</button>
            <button class="theme-btn" data-theme="black">Oled</button>
          </div>
        </div>
      </header>

      <div id="content-area"></div>
    </main>
  </div>

  <div class="lightbox" id="lightbox-overlay" onclick="closeLightbox(event)">
    <div class="lightbox-content">
      <div class="lightbox-header">
        <h2 class="lightbox-title" id="lightbox-title"></h2>
        <div class="lightbox-close-btn" onclick="closeLightbox()">
          <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </div>
      </div>
      <div class="lightbox-body">
        <img id="lightbox-img" src="" style="max-width:100%;max-height:100%;object-fit:contain;" />
      </div>
    </div>
  </div>

  <script src="/assets/dashboard.js"></script>
  <script>
    let currentProtocol = null;
    let currentStep = null;
    let filesCache = {};

    async function render() {
      if (!currentProtocol) {
        await renderProtocols();
      } else if (!currentStep) {
        await renderSteps();
      } else {
        renderThumbnails();
      }
    }

    async function renderProtocols() {
      const area = document.getElementById("content-area");
      area.innerHTML = '<div class="skeleton" style="height:120px;"></div>';

      try {
        const data = await window.SciApp.apiFetch("/api/project");

        const projName = data.project_name || "(no project)";
        document.getElementById("bc-project").textContent = projName;
        document.getElementById("ctx-project").textContent = projName;
        document.getElementById("ctx-protocol").textContent = "-";
        document.getElementById("ctx-step").textContent = "-";
        document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root">' + projName + '</span>';

        if (!data.protocols.length) {
          area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-muted);">No protocols found in this project.</div>';
          return;
        }

        const protoCards = data.protocols.map(p => {
          return '<div class="protocol-card" onclick="selectProtocol(\'' + p.name.replace(/'/g, "\\'") + '\')">'
            + '<div class="protocol-card-header">'
            + '<div><h3 class="protocol-name">' + p.name + '</h3></div>'
            + '<span class="protocol-badge">' + p.steps.length + ' steps</span>'
            + '</div>'
            + '<div class="protocol-meta-details">'
            + '<div class="meta-col"><span class="meta-label">Files</span><span class="meta-value">' + p.total_files + '</span></div>'
            + '<div class="meta-col"><span class="meta-label">Cells</span><span class="meta-value">' + p.measured_cells + '</span></div>'
            + '<div class="meta-col"><span class="meta-label">Yield</span><span class="meta-value meta-value-green">' + p.switching_yield + '%</span></div>'
            + '</div>'
            + '</div>';
        }).join("");

        area.innerHTML = '<section class="page-title-row">'
          + '<h1 class="page-title">' + projName + '</h1>'
          + '<p class="page-subtitle">' + data.stats.total_protocols + ' protocols &middot; ' + data.stats.total_files + ' files</p>'
          + '</section>'
          + '<div class="section-card">'
          + '<div class="section-header"><h2 class="section-title">Protocols</h2></div>'
          + '<div class="protocols-list">' + protoCards + '</div>'
          + '</div>';
      } catch (e) {
        area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--accent-red)">Failed to load project. Is <code>sci serve</code> running?</div>';
      }
    }

    async function selectProtocol(name) {
      currentProtocol = name;
      currentStep = null;
      document.getElementById("ctx-protocol").textContent = name;
      document.getElementById("ctx-step").textContent = "-";

      const area = document.getElementById("content-area");
      area.innerHTML = '<div class="skeleton" style="height:120px;"></div>';

      try {
        const data = await window.SciApp.apiFetch("/api/protocol/" + encodeURIComponent(name) + "/files");
        filesCache[name] = data;
        renderSteps();
      } catch (e) {
        area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--accent-red)">Failed to load protocol: ' + name + '</div>';
      }
    }

    function renderSteps() {
      const data = filesCache[currentProtocol];
      if (!data) return;

      const projName = (window.SciApp.currentProject && window.SciApp.currentProject.project_name) || "project";
      document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root breadcrumb-link" onclick="goHome()">' + projName + '</span>'
        + '<span class="breadcrumb-separator">/</span>'
        + '<span class="breadcrumb-current">' + currentProtocol + '</span>';

      const area = document.getElementById("content-area");
      if (!data.steps.length) {
        area.innerHTML = '<section class="page-title-row"><h1 class="page-title">' + currentProtocol + '</h1><p class="page-subtitle">No steps found</p></section>';
        return;
      }

      const stepCards = data.steps.map(s => {
        return '<div class="protocol-card" onclick="selectStep(\'' + s.name.replace(/'/g, "\\'") + '\')">'
          + '<div class="protocol-card-header">'
          + '<div><h3 class="protocol-name">' + s.name + '</h3></div>'
          + '<span class="protocol-badge">' + s.files.length + ' files</span>'
          + '</div>'
          + '</div>';
      }).join("");

      area.innerHTML = '<section class="page-title-row">'
        + '<h1 class="page-title">' + currentProtocol + '</h1>'
        + '<p class="page-subtitle">' + data.steps.length + ' steps</p>'
        + '</section>'
        + '<div class="section-card">'
        + '<div class="section-header"><h2 class="section-title">Steps</h2></div>'
        + '<div class="protocols-list">' + stepCards + '</div>'
        + '</div>';
    }

    function selectStep(name) {
      currentStep = name;
      document.getElementById("ctx-step").textContent = name;
      renderThumbnails();
    }

    function renderThumbnails() {
      const data = filesCache[currentProtocol];
      if (!data) return;

      const step = data.steps.find(s => s.name === currentStep);
      const projName = (window.SciApp.currentProject && window.SciApp.currentProject.project_name) || "project";

      document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root breadcrumb-link" onclick="goHome()">' + projName + '</span>'
        + '<span class="breadcrumb-separator">/</span>'
        + '<span class="breadcrumb-root breadcrumb-link" onclick="goToProtocol()">' + currentProtocol + '</span>'
        + '<span class="breadcrumb-separator">/</span>'
        + '<span class="breadcrumb-current">' + currentStep + '</span>';

      const area = document.getElementById("content-area");

      if (!step || !step.files.length) {
        area.innerHTML = '<section class="page-title-row"><h1 class="page-title">' + currentStep + '</h1><p class="page-subtitle">No plots in this step</p></section>';
        return;
      }

      const thumbnails = step.files.map(f => {
        const imgPath = "/files/" + f.path;
        const isPdf = f.type === "pdf";
        const thumbnailHtml = isPdf
          ? '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-family:var(--font-mono);font-size:13px;">PDF</div>'
          : '<img src="' + imgPath + '" style="width:100%;height:100%;object-fit:cover;" loading="lazy" />';
        const clickHandler = isPdf
          ? 'onclick="window.open(\'' + imgPath + '\')"'
          : 'onclick="openLightbox(\'' + f.name.replace(/'/g, "\\'") + '\', \'' + imgPath + '\')"';

        return '<div class="plot-card" ' + clickHandler + '>'
          + '<div class="plot-card-media">' + thumbnailHtml + '</div>'
          + '<div class="plot-card-content">'
          + '<div class="plot-provenance" style="font-size:11px;">' + f.name + '</div>'
          + '</div>'
          + '</div>';
      }).join("");

      area.innerHTML = '<section class="page-title-row">'
        + '<h1 class="page-title">' + currentStep + '</h1>'
        + '<p class="page-subtitle">' + step.files.length + ' plot files</p>'
        + '</section>'
        + '<div class="gallery-grid" id="thumbnail-grid">' + thumbnails + '</div>';
    }

    function goHome() {
      currentProtocol = null;
      currentStep = null;
      document.getElementById("ctx-protocol").textContent = "-";
      document.getElementById("ctx-step").textContent = "-";
      render();
    }

    function goToProtocol() {
      currentStep = null;
      document.getElementById("ctx-step").textContent = "-";
      renderSteps();
    }

    function openLightbox(title, src) {
      document.getElementById("lightbox-title").textContent = title;
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox-overlay").classList.add("active");
    }

    function closeLightbox(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById("lightbox-overlay").classList.remove("active");
      document.getElementById("lightbox-img").src = "";
    }

    function toggleView(mode) {
      const grid = document.getElementById("thumbnail-grid");
      if (!grid) return;
      if (mode === "list") {
        grid.classList.add("list-view");
      } else {
        grid.classList.remove("list-view");
      }
    }

    document.addEventListener("DOMContentLoaded", render);
  </script>
</body>
</html>

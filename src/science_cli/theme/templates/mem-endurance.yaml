technique: mem-endurance
plot_type: scatter
figure:
  figsize: [3.54, 2.76]
  dpi: 600
  facecolor: white
axes:
  xlabel: "Cycle (#)"
  ylabel: "Resistance (Ω)"
  xlim: null
  ylim: null
  tick_direction: in
  tick_length: 3
  tick_width: 0.5
  linewidth: 0.5
  grid: false
  aspect: auto
defaults:
  marker: "o"
  markersize: 2
  alpha: 0.6
font:
  family: Helvetica
  label_size: 7
  tick_size: 6
  title_size: 8
  legend_size: 6
colors:
  lrs: "#009E73"
  hrs: "#D55E00"
savefig:
  format: pdf
  dpi: 600
  bbox_inches: tight
  pad_inches: 0.05
presets:
  x_units: "cycles"
  y_units: "Ω"
  y_scale: log
  show_lrs: true
  lrs_color: "#009E73"
  show_hrs: true
  hrs_color: "#D55E00"
  show_median: true
  median_linewidth: 0.5
  show_read_voltage: true
  read_voltage_label: "V_read (V)"
  endurance_threshold: 10

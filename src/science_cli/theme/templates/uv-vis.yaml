technique: uv-vis
plot_type: line
figure:
  figsize: [3.54, 2.76]
  dpi: 600
  facecolor: white
axes:
  xlabel: "Wavelength (nm)"
  ylabel: "Absorbance (a.u.)"
  xlim: [300, 800]
  ylim: null
  tick_direction: in
  tick_length: 3
  tick_width: 0.5
  linewidth: 0.5
  grid: false
  aspect: auto
defaults:
  linewidth: 0.75
  linestyle: "-"
  color: "#000000"
font:
  family: Helvetica
  label_size: 7
  tick_size: 6
  title_size: 8
  legend_size: 6
colors:
  qualitative: ["#000000", "#D55E00", "#0072B2", "#009E73", "#CC79A7"]
savefig:
  format: pdf
  dpi: 600
  bbox_inches: tight
  pad_inches: 0.05
presets:
  x_units: "nm"
  y_units: "absorbance"
  uv_region: [300, 400]
  visible_region: [400, 800]
  show_full_range: true
  normalize_at_peak: true

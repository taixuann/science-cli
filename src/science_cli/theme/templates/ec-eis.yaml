technique: ec-eis
plot_type: line
figure:
  figsize: [3.54, 3.54]
  dpi: 600
  facecolor: white
axes:
  xlabel: "Z' (Ω)"
  ylabel: "-Z'' (Ω)"
  xlim: null
  ylim: null
  tick_direction: in
  tick_length: 3
  tick_width: 0.5
  linewidth: 0.5
  grid: false
  aspect: equal
defaults:
  linewidth: 0.75
  linestyle: "-"
  color: "#000000"
font:
  family: Helvetica
  label_size: 7
  tick_size: 6
  title_size: 8
  legend_size: 6
colors:
  data: "#009E73"
  fit: "#D55E00"
savefig:
  format: pdf
  dpi: 600
  bbox_inches: tight
  pad_inches: 0.05
presets:
  x_units: "Ω"
  y_units: "Ω"
  plot_type: nyquist
  forced_aspect_ratio: 1.0
  show_fit: true
  fit_linewidth: 0.5
  fit_linestyle: "--"
  fit_color: "#D55E00"
  show_frequency_arrow: true
  frequency_arrow_label: "f (Hz)"

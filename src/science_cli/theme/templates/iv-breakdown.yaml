technique: iv-breakdown
plot_type: line
figure:
  figsize: [3.54, 2.76]
  dpi: 600
  facecolor: white
axes:
  xlabel: "Voltage (V)"
  ylabel: "Current (A)"
  xlim: null
  ylim: null
  tick_direction: in
  tick_length: 3
  tick_width: 0.5
  linewidth: 0.5
  grid: false
  aspect: auto
defaults:
  linewidth: 0.75
  linestyle: "-"
  color: "#D55E00"
font:
  family: Helvetica
  label_size: 7
  tick_size: 6
  title_size: 8
  legend_size: 6
colors:
  qualitative: ["#D55E00", "#CC79A7", "#0072B2"]
savefig:
  format: pdf
  dpi: 600
  bbox_inches: tight
  pad_inches: 0.05
presets:
  x_units: "V"
  y_units: "A"
  semi_log_y: true
  highlight_breakdown: true
  breakdown_marker: "v"
  breakdown_color: "#CC0000"
  show_compliance: true
  compliance_label: "Compliance (A)"

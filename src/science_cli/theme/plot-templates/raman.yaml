technique: raman
plot_type: line
figure:
  figsize: [3.54, 2.76]
  dpi: 600
  facecolor: white
axes:
  xlabel: "Raman shift (cm⁻¹)"
  ylabel: "Intensity (a.u.)"
  xlim: [200, 1800]
  ylim: null
  tick_direction: in
  tick_length: 3
  tick_width: 0.5
  linewidth: 0.5
  grid: false
  aspect: auto
defaults:
  linewidth: 0.75
  linestyle: "-"
  color: "#000000"
font:
  family: Helvetica
  label_size: 7
  tick_size: 6
  title_size: 8
  legend_size: 6
colors:
  qualitative: ["#000000", "#D55E00", "#0072B2", "#009E73", "#CC79A7"]
savefig:
  format: pdf
  dpi: 600
  bbox_inches: tight
  pad_inches: 0.05
presets:
  x_units: "cm⁻¹"
  y_units: "a.u."
  fingerprint_region: [200, 1800]
  high_frequency_region: [1800, 3500]
  show_full_range: false
  annotate_peaks: true
  peak_prominence_pct: 15
  baseline_method: asls
  label_peaks: true

technique: ec-cv
plot_type: line
figure:
  figsize: [3.54, 2.76]
  dpi: 600
  facecolor: white
axes:
  xlabel: "E vs Ref (V)"
  ylabel: "I (mA)"
  xlim: null
  ylim: null
  tick_direction: in
  tick_length: 3
  tick_width: 0.5
  linewidth: 0.5
  grid: false
  aspect: auto
defaults:
  linewidth: 0.75
  linestyle: "-"
  color: "#000000"
font:
  family: Helvetica
  label_size: 7
  tick_size: 6
  title_size: 8
  legend_size: 6
colors:
  forward: "#0072B2"
  reverse: "#D55E00"
savefig:
  format: pdf
  dpi: 600
  bbox_inches: tight
  pad_inches: 0.05
presets:
  x_units: "V vs Ref"
  y_units: "mA"
  iupac_convention: true
  anodic_up: true
  show_scan_arrow: true
  scan_arrow_style: "->"
  scan_segments: 2
  show_scan_rate: true
  scan_rate_label: "Scan rate (mV/s)"

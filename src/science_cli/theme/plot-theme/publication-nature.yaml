name: publication-nature
description: >-
  Nature Research — Helvetica 5-7pt, 88mm single column, 300/600 DPI,
  minimal ink (open axes), pdf.fonttype=42 for editable text.
  Complies with https://research-figure-guide.nature.com
figure:
  facecolor: white
  figsize: [3.46, 2.75]
  dpi: 300
axes:
  facecolor: white
  edgecolor: black
  labelcolor: black
  titlecolor: black
  grid: false
  linewidth: 0.5
  spines_top: false
  spines_right: false
grid:
  color: "#cccccc"
  alpha: 0.3
  linestyle: "-"
ticks:
  color: black
  direction: in
  major_width: 0.5
  major_size: 3
font:
  family: Helvetica
  size: 7
  axes_labelsize: 7
  axes_titlesize: 8
  tick_labelsize: 6
  legend_size: 6
legend:
  frameon: false
  fancybox: false
  loc: best
lines:
  linewidth: 0.75
  markersize: 3
  linestyle: "-"
colors:
  prop_cycle:
    - "#000000"
    - "#0072B2"
    - "#D55E00"
    - "#009E73"
    - "#E69F00"
    - "#56B4E9"
    - "#CC79A7"
    - "#F0E442"
savefig:
  dpi: 600
  bbox: tight
  pad_inches: 0.05
  format: pdf
pdf:
  fonttype: 42

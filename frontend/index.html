<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sci — Plot Gallery</title>
  <link rel="stylesheet" href="/assets/dashboard.css" />
</head>
<body>
  <div class="app-container">
    <header class="mobile-header">
      <div class="logo-text">sci <span class="logo-subtitle">gallery</span></div>
      <div class="menu-toggle">
        <svg fill="none" stroke="currentColor" stroke-dasharray="0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" height="24">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-icon">&mu;</div>
        <div>
          <span class="logo-text">science-cli</span>
          <span class="logo-subtitle">plot gallery</span>
        </div>
      </div>

      <div class="sidebar-context">
        <div class="context-title">Current Session</div>
        <div class="context-item">
          <span class="context-label">Project: </span>
          <span class="context-value" id="ctx-project">Loading...</span>
        </div>
        <div class="context-item">
          <span class="context-label">Protocol: </span>
          <span class="context-value" id="ctx-protocol">-</span>
        </div>
        <div class="context-item">
          <span class="context-label">Step: </span>
          <span class="context-value" id="ctx-step">-</span>
        </div>
      </div>

      <div class="sidebar-filters">
        <div class="sidebar-form-group">
          <label class="sidebar-form-label">Protocol</label>
          <select class="sidebar-select" id="sel-protocol" onchange="selectProtocol(this.value)">
            <option value="">-- Select protocol --</option>
          </select>
        </div>
        <div class="sidebar-form-group">
          <label class="sidebar-form-label">Search</label>
          <input type="text" class="sidebar-search" id="filter-search" placeholder="Filter filenames..." oninput="filterThumbnails(this.value)" />
        </div>
        <div class="sidebar-form-group">
          <label class="sidebar-form-label">Columns</label>
          <div class="col-btn-group">
            <button class="col-btn" onclick="setCols(3)">3</button>
            <button class="col-btn active" onclick="setCols(4)">4</button>
            <button class="col-btn" onclick="setCols(5)">5</button>
          </div>
        </div>
        <div class="connection-indicator" style="margin-bottom:12px;">
          <div class="status-dot"></div>
          <span>cli online</span>
        </div>
      </div>

      <nav class="nav-links" id="step-nav" style="display:none;">
        <div class="sidebar-form-label" style="margin-bottom:8px;">Steps</div>
      </nav>
    </aside>

    <main class="main-content" id="main-content">
      <header class="main-header">
        <div class="breadcrumb" id="breadcrumb">
          <span class="breadcrumb-root" id="bc-project">project</span>
        </div>
        <div class="header-actions">
          <div class="theme-chooser">
            <button class="theme-btn" data-theme="dark">Dark</button>
            <button class="theme-btn" data-theme="light">Light</button>
            <button class="theme-btn" data-theme="black">Oled</button>
          </div>
        </div>
      </header>

      <div id="content-area"></div>
    </main>
  </div>

  <div class="lightbox" id="lightbox-overlay" onclick="closeLightbox(event)">
    <div class="lightbox-content">
      <div class="lightbox-header">
        <h2 class="lightbox-title" id="lightbox-title"></h2>
        <div class="lightbox-close-btn" onclick="closeLightbox()">
          <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </div>
      </div>
      <div class="lightbox-body" id="lightbox-body"></div>
    </div>
  </div>

  <script src="/assets/dashboard.js"></script>
  <script>
    let protocolNames = [];
    let filesCache = {};
    let activeProtocol = null;
    let activeStep = null;
    let columns = 4;
    let searchQuery = "";
    let plotlyLoaded = false;
    let dahsedData = {};
    let activeCell = null;

    async function init() {
      const area = document.getElementById("content-area");
      area.innerHTML = '<div class="skeleton" style="height:120px;"></div>';
      try {
        const data = await window.SciApp.apiFetch("/api/project");
        const projName = data.project_name || "(no project)";
        document.getElementById("bc-project").textContent = projName;
        document.getElementById("ctx-project").textContent = projName;
        document.getElementById("ctx-protocol").textContent = "-";
        document.getElementById("ctx-step").textContent = "-";

        if (!data.protocols.length) {
          area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-muted);">No protocols found.</div>';
          return;
        }

        protocolNames = data.protocols.map(p => p.name);
        const sel = document.getElementById("sel-protocol");
        sel.innerHTML = '<option value="">-- Select protocol --</option>';
        data.protocols.forEach(p => {
          const opt = document.createElement("option");
          opt.value = p.name;
          opt.textContent = p.name;
          sel.appendChild(opt);
        });

        showProtocolList(data);
      } catch (e) {
        area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--accent-red)">Failed to load project. Is <code>sci serve</code> running?</div>';
      }
    }

    function showProtocolList(data) {
      const area = document.getElementById("content-area");
      const cards = data.protocols.map(p =>
        '<div class="protocol-card" onclick="selectProtocol(\'' + p.name.replace(/'/g, "\\'") + '\')">'
        + '<div class="protocol-card-header">'
        + '<div><h3 class="protocol-name">' + p.name + '</h3></div>'
        + '<span class="protocol-badge">' + p.steps.length + ' steps</span>'
        + '</div>'
        + '<div class="protocol-meta-details">'
        + '<div class="meta-col"><span class="meta-label">Files</span><span class="meta-value">' + p.total_files + '</span></div>'
        + '<div class="meta-col"><span class="meta-label">Cells</span><span class="meta-value">' + p.measured_cells + '</span></div>'
        + '<div class="meta-col"><span class="meta-label">Yield</span><span class="meta-value meta-value-green">' + p.switching_yield + '%</span></div>'
        + '</div></div>'
      ).join("");

      document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root">' + (data.project_name || "project") + '</span>';
      area.innerHTML = '<section class="page-title-row">'
        + '<h1 class="page-title">' + (data.project_name || "Project") + '</h1>'
        + '<p class="page-subtitle">' + data.stats.total_protocols + ' protocols &middot; ' + data.stats.total_files + ' files</p>'
        + '</section>'
        + '<div class="section-card">'
        + '<div class="section-header"><h2 class="section-title">Protocols</h2></div>'
        + '<div class="protocols-list">' + cards + '</div></div>';
    }

    async function selectProtocol(name) {
      if (!name) {
        activeProtocol = null;
        activeStep = null;
        document.getElementById("ctx-protocol").textContent = "-";
        document.getElementById("ctx-step").textContent = "-";
        document.getElementById("step-nav").style.display = "none";
        document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root">' + (window.SciApp.currentProject?.project_name || "project") + '</span>';
        const data = await window.SciApp.apiFetch("/api/project");
        showProtocolList(data);
        return;
      }

      activeProtocol = name;
      activeStep = null;
      document.getElementById("ctx-protocol").textContent = name;
      document.getElementById("ctx-step").textContent = "-";
      document.getElementById("sel-protocol").value = name;
      document.getElementById("filter-search").value = "";
      searchQuery = "";

      const area = document.getElementById("content-area");
      area.innerHTML = '<div class="skeleton" style="height:120px;"></div>';

      try {
        const [filesData, sumData, heatData, histData] = await Promise.all([
          window.SciApp.apiFetch("/api/protocol/" + encodeURIComponent(name) + "/files"),
          window.SciApp.apiFetch("/api/protocol/" + encodeURIComponent(name) + "/summary").catch(() => null),
          window.SciApp.apiFetch("/api/protocol/" + encodeURIComponent(name) + "/heatmap?metric=ratio&material=").catch(() => null),
          window.SciApp.apiFetch("/api/protocol/" + encodeURIComponent(name) + "/histograms").catch(() => null),
        ]);
        filesCache[name] = filesData;
        dahsedData[name] = { summary: sumData, heatmap: heatData, histograms: histData };
        populateStepNav(filesData);
        showStepList(filesData);
      } catch (e) {
        area.innerHTML = '<div style="padding:60px;text-align:center;color:var(--accent-red)">Failed to load protocol: ' + name + '</div>';
      }
    }

    function populateStepNav(data) {
      const nav = document.getElementById("step-nav");
      nav.style.display = "block";
      nav.innerHTML = '<div class="sidebar-form-label" style="margin-bottom:8px;">Steps</div>';
      data.steps.forEach(s => {
        const a = document.createElement("a");
        a.className = "nav-link" + (activeStep === s.name ? " active" : "");
        a.href = "#";
        a.dataset.step = s.name;
        a.innerHTML = '<span>' + s.name + '</span><span style="margin-left:auto;font-size:10px;color:var(--text-muted);">' + s.files.length + '</span>';
        a.addEventListener("click", e => {
          e.preventDefault();
          selectStep(s.name);
        });
        nav.appendChild(a);
      });
    }

    function showStepList(data) {
      const area = document.getElementById("content-area");
      document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root">' + (window.SciApp.currentProject?.project_name || "project") + '</span>'
        + '<span class="breadcrumb-separator">/</span>'
        + '<span class="breadcrumb-current">' + activeProtocol + '</span>';

      if (!data.steps.length) {
        area.innerHTML = '<section class="page-title-row"><h1 class="page-title">' + activeProtocol + '</h1><p class="page-subtitle">No steps found</p></section>';
        return;
      }

      document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root">' + (window.SciApp.currentProject?.project_name || "project") + '</span>'
        + '<span class="breadcrumb-separator">/</span>'
        + '<span class="breadcrumb-current">' + activeProtocol + '</span>';

      const cards = data.steps.map(s =>
        '<div class="protocol-card" onclick="selectStep(\'' + s.name.replace(/'/g, "\\'") + '\')">'
        + '<div class="protocol-card-header">'
        + '<div><h3 class="protocol-name">' + s.name + '</h3></div>'
        + '<span class="protocol-badge">' + s.files.length + ' files</span>'
        + '</div></div>'
      ).join("");

      area.innerHTML = '<section class="page-title-row">'
        + '<h1 class="page-title">' + activeProtocol + '</h1>'
        + '<p class="page-subtitle">' + data.steps.length + ' steps</p>'
        + '</section>'
        + '<div class="section-card">'
        + '<div class="section-header"><h2 class="section-title">Steps</h2></div>'
        + '<div class="protocols-list">' + cards + '</div></div>';
    }

    function selectStep(name) {
      activeStep = name;
      document.getElementById("ctx-step").textContent = name;
      document.querySelectorAll("#step-nav .nav-link").forEach(el => {
        el.classList.toggle("active", el.dataset.step === name);
      });
      showGallery();
    }

    function showGallery() {
      currentTab = 'gallery';
      const data = filesCache[activeProtocol];
      const step = data.steps.find(s => s.name === activeStep);
      const area = document.getElementById("content-area");

      document.getElementById("breadcrumb").innerHTML = '<span class="breadcrumb-root">' + (window.SciApp.currentProject?.project_name || "project") + '</span>'
        + '<span class="breadcrumb-separator">/</span>'
        + '<span class="breadcrumb-root">' + activeProtocol + '</span>'
        + '<span class="breadcrumb-separator">/</span>'
        + '<span class="breadcrumb-current">' + activeStep + '</span>';

      if (!step || !step.files.length) {
        area.innerHTML = '<section class="page-title-row"><h1 class="page-title">' + activeStep + '</h1><p class="page-subtitle">No plots in this step</p></section>';
        return;
      }

      const hasDash = !!dahsedData[activeProtocol]?.heatmap;
      const tabs = '<div class="tab-bar">'
        + '<button class="tab active" data-tab="gallery" onclick="switchTab(\'gallery\')">Gallery</button>'
        + (hasDash ? '<button class="tab" data-tab="dashboard" onclick="switchTab(\'dashboard\')">Dashboard</button>' : "")
        + '</div>';

      area.innerHTML = '<section class="page-title-row">'
        + '<h1 class="page-title">' + activeStep + '</h1>'
        + '<p class="page-subtitle">' + step.files.length + ' plot files</p>'
        + '</section>'
        + tabs
        + '<div class="gallery-grid tight-gallery" id="thumbnail-grid" style="grid-template-columns:repeat(' + columns + ',1fr);">'
        + renderThumbnails(step)
        + '</div>';
    }

    function renderThumbnails(step) {
      if (!step) return "";
      const q = searchQuery.toLowerCase();
      const filtered = q ? step.files.filter(f => f.name.toLowerCase().includes(q)) : step.files;
      if (!filtered.length) {
        return '<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--text-muted)">No files match "' + searchQuery + '"</div>';
      }
      return filtered.map(f => {
        const imgPath = "/files/" + f.path;
        const isPdf = f.type === "pdf";
        const media = isPdf
          ? '<embed src="' + imgPath + '" type="application/pdf" style="width:100%;height:100%;" />'
          : '<img src="' + imgPath + '" style="width:100%;height:100%;object-fit:cover;" loading="lazy" />';
        return '<div class="plot-card" onclick="openLightbox(\'' + f.name.replace(/'/g, "\\'") + '\', \'' + imgPath + '\', ' + isPdf + ')">'
          + '<div class="plot-card-media">' + media + '</div>'
          + '<div class="plot-card-content"><div class="plot-provenance" style="font-size:10px;">' + f.name + '</div></div></div>';
      }).join("");
    }

    function filterThumbnails(q) {
      searchQuery = q;
      const grid = document.getElementById("thumbnail-grid");
      if (!grid) return;
      const data = filesCache[activeProtocol];
      if (!data) return;
      const step = data.steps.find(s => s.name === activeStep);
      if (!step) return;
      grid.innerHTML = renderThumbnails(step);
    }

    function setCols(n) {
      columns = n;
      document.querySelectorAll(".col-btn").forEach(b => {
        b.classList.toggle("active", parseInt(b.textContent) === n);
      });
      const grid = document.getElementById("thumbnail-grid");
      if (grid) grid.style.gridTemplateColumns = "repeat(" + n + ",1fr)";
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.tab === tab);
      });
      if (tab === "dashboard") {
        showDashboard();
      } else {
        const g = document.getElementById("thumbnail-grid");
        if (g) g.style.display = "grid";
        const d = document.getElementById("dashboard-view");
        if (d) d.remove();
      }
    }

    async function showDashboard() {
      const area = document.getElementById("content-area");
      const existing = document.getElementById("dashboard-view");
      if (existing) { existing.style.display = "block"; return; }
      const grid = document.getElementById("thumbnail-grid");
      if (grid) grid.style.display = "none";

      await loadPlotly();
      const dd = dahsedData[activeProtocol];
      if (!dd || !dd.heatmap) {
        area.insertAdjacentHTML("beforeend", '<div id="dashboard-view"><div style="padding:40px;text-align:center;color:var(--text-muted)">No heatmap data for this protocol</div></div>');
        return;
      }

      const h = dd.heatmap;
      const sum = dd.summary?.aggregate || {};
      const hist = dd.histograms || {};

      area.insertAdjacentHTML("beforeend",
        '<div id="dashboard-view"><div class="d-layout">'
        + '<div><div class="d-crossbar" id="d-crossbar">'
        + renderCrossbar(h)
        + '</div></div>'
        + '<div><div class="d-device-panel" id="d-device" style="display:none"></div>'
        + '<div id="d-iv-chart" style="width:100%;height:280px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;">Click a cell to load IV curve</div></div>'
        + '</div>'
        + '<div class="d-histograms" id="d-histograms">'
        + renderHistogram("Vset Distribution", hist.vset)
        + renderHistogram("Vreset Distribution", hist.vreset)
        + renderHistogram("ON/OFF Ratio Distribution", hist.ratio)
        + '</div></div>'
      );

      document.querySelectorAll("#d-crossbar .d-cell:not(.unmeasured)").forEach(el => {
        el.addEventListener("click", () => selectDashCell(el.dataset.cell));
      });
    }

    function renderCrossbar(h) {
      let html = '<div class="d-label-cell">row\\col</div>';
      for (let c = 1; c <= 6; c++) html += '<div class="d-label-cell">C' + c + '</div>';
      for (let r = 0; r < 6; r++) {
        html += '<div class="d-label-cell">R' + (r + 1) + '</div>';
        for (let c = 0; c < 6; c++) {
          const val = h.data[r][c];
          const meta = h.metadata[r][c];
          const cellId = meta.cell;
          const measured = val !== null;
          const intensity = measured ? Math.min(val / 500, 1) : 0;
          const bg = measured ? 'background:rgba(233,69,96,' + (0.2 + intensity * 0.8) + ')' : '';
          const cls = measured ? "d-cell" : "d-cell unmeasured";
          html += '<div class="' + cls + '" data-cell="' + cellId + '" style="' + bg + '" title="' + cellId + ': ' + (measured ? val.toFixed(1) : 'N/A') + '">'
            + '<span class="d-cell-label">' + cellId + '</span>'
            + (measured ? '<span class="d-cell-value">' + val.toFixed(1) + '</span>' : '<span class="d-cell-value" style="color:var(--text-muted)">-</span>')
            + '</div>';
        }
      }
      return html;
    }

    function renderHistogram(title, data) {
      if (!data || !data.bins || !data.counts) {
        return '<div class="d-histogram-card"><h4>' + title + '</h4><div style="color:var(--text-muted);font-size:11px;padding:20px 0;text-align:center;">No data</div></div>';
      }
      const max = Math.max(...data.counts, 1);
      const bars = data.counts.map((v, i) => {
        const h = (v / max) * 60;
        return '<rect x="' + (i * 28 + 4) + '" y="' + (70 - h) + '" width="22" height="' + h + '" fill="var(--accent-cyan)" rx="2" opacity="0.7"/>'
          + '<text x="' + (i * 28 + 15) + '" y="78" fill="var(--text-muted)" font-size="7" text-anchor="middle">' + (data.bins[i] || "").replace(/[-\s]/g, "").substring(0, 5) + '</text>';
      }).join("");
      return '<div class="d-histogram-card"><h4>' + title + '</h4>'
        + '<svg class="d-histogram-svg" viewBox="0 0 ' + Math.max(data.bins.length * 28, 80) + ' 80">'
        + bars + '</svg></div>';
    }

    async function selectDashCell(cellId) {
      activeCell = cellId;
      document.querySelectorAll("#d-crossbar .d-cell").forEach(el => el.classList.toggle("active", el.dataset.cell === cellId));

      const panel = document.getElementById("d-device");
      panel.style.display = "block";
      panel.innerHTML = '<div class="skeleton" style="height:60px;"></div>';

      try {
        const ivData = await window.SciApp.apiFetch("/api/protocol/" + encodeURIComponent(activeProtocol) + "/device/" + cellId + "/iv");
        const switching = ivData.switching;

        panel.innerHTML = '<div class="d-device-header">'
          + '<span class="d-device-name">' + ivData.cell_id + '</span>'
          + '<span class="d-device-status ' + (switching ? 'ok' : 'defect') + '">' + (switching ? 'Active Switching' : 'Non-Switching') + '</span>'
          + '</div>'
          + '<div class="d-device-grid">'
          + '<div><div class="d-stat-label">Material</div><div class="d-stat-value">' + (ivData.material || "-") + '</div></div>'
          + '<div><div class="d-stat-label">Vset</div><div class="d-stat-value">' + (switching ? ivData.v_set + ' V' : '-') + '</div></div>'
          + '<div><div class="d-stat-label">Vreset</div><div class="d-stat-value">' + (switching ? ivData.v_reset + ' V' : '-') + '</div></div>'
          + '<div><div class="d-stat-label">Ratio</div><div class="d-stat-value">' + (ivData.ratio > 0 ? ivData.ratio : '-') + '</div></div>'
          + '</div>';

        renderIVChart(ivData);
      } catch (e) {
        panel.innerHTML = '<div class="d-device-header"><span class="d-device-name">' + cellId + '</span></div><div style="color:var(--accent-red);font-size:12px;">Failed to load IV data</div>';
      }
    }

    function renderIVChart(ivData) {
      const traces = ivData.sweeps.map((s, i) => ({
        x: s.voltage,
        y: s.current.map(c => Math.abs(c)),
        name: s.label,
        mode: "lines",
        type: "scatter",
        line: { width: 2, color: i === 0 ? "#00d4ff" : i === 1 ? "#b388ff" : "#00e676" },
      }));

      if (ivData.switching) {
        ivData.sweeps.forEach(s => {
          if (s.v_set) traces.push({ x: [s.v_set], y: [Math.abs(s.current[s.voltage.indexOf(s.v_set) >= 0 ? s.voltage.indexOf(s.v_set) : 0])], mode: "markers", marker: { size: 8, color: "red" }, showlegend: false });
          if (s.v_reset) traces.push({ x: [s.v_reset], y: [Math.abs(s.current[s.voltage.indexOf(s.v_reset) >= 0 ? s.voltage.indexOf(s.v_reset) : 0])], mode: "markers", marker: { size: 8, color: "orange" }, showlegend: false });
        });
      }

      Plotly.newPlot("d-iv-chart", traces, {
        margin: { t: 20, b: 40, l: 50, r: 10 },
        paper_bgcolor: "transparent",
        plot_bgcolor: "transparent",
        font: { family: "'JetBrains Mono', monospace", size: 10, color: getComputedStyle(document.documentElement).getPropertyValue("--text-secondary").trim() || "#cbd5e1" },
        xaxis: { title: "Voltage (V)", gridcolor: "rgba(255,255,255,0.06)", zeroline: true, zerolinecolor: "rgba(255,255,255,0.1)" },
        yaxis: { title: "|Current| (A)", type: "log", gridcolor: "rgba(255,255,255,0.06)", zeroline: true, zerolinecolor: "rgba(255,255,255,0.1)" },
        showlegend: true,
        legend: { orientation: "h", y: -0.25, font: { size: 9 } },
      }, { responsive: true, displayModeBar: false });
    }

    async function loadPlotly() {
      if (plotlyLoaded) return;
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://cdn.plot.ly/plotly-2.27.0.min.js";
        s.onload = () => { plotlyLoaded = true; resolve(); };
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function openLightbox(title, src, isPdf) {
      document.getElementById("lightbox-title").textContent = title;
      const body = document.getElementById("lightbox-body");
      body.innerHTML = isPdf
        ? '<embed src="' + src + '" type="application/pdf" style="width:100%;height:100%;" />'
        : '<img src="' + src + '" style="max-width:100%;max-height:100%;object-fit:contain;" />';
      document.getElementById("lightbox-overlay").classList.add("active");
    }

    function closeLightbox(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById("lightbox-overlay").classList.remove("active");
      document.getElementById("lightbox-body").innerHTML = "";
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
